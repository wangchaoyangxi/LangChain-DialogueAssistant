name: Bug Report
description: 报告一个 Bug
labels: [bug]
body:
  - type: markdown
    attributes:
      value: 感谢提交 Bug 报告！请尽量填写完整信息，帮助我们快速定位问题。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述发生了什么
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开 ...
        2. 输入 ...
        3. 看到报错 ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你期望发生什么？
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      placeholder: |
        - Node.js 版本：
        - 操作系统：
        - 浏览器（如适用）：
