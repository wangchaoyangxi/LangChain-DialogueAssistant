name: Feature Request
description: 提出新功能建议
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: 感谢提出建议！请描述你的需求场景。

  - type: textarea
    id: problem
    attributes:
      label: 需求背景
      description: 你遇到了什么问题，或者希望实现什么场景？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 你希望如何实现这个功能？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 其他方案
      description: 你考虑过哪些替代方案？
